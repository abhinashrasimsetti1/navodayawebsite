<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - JNV</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div class="login-page">
    <div class="login-box">
      <div class="login-logo">JNV<span>.</span></div>
      <div class="login-sub">Admin Panel · Authorized Access Only</div>
      <div class="login-error" id="loginError"><i class="fas fa-exclamation-circle"></i> <span id="loginErrorText"></span></div>
      <form id="loginForm" autocomplete="off">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="loginUser" placeholder="Enter username" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPass" placeholder="Enter password" required>
        </div>
        <button type="submit" class="login-btn" id="loginBtn">Sign In <i class="fas fa-arrow-right"></i></button>
      </form>
      <div class="login-footer">
        Default: <strong>admin</strong> / <strong>jnv2026</strong>
      </div>
    </div>
  </div>
  <script src="js/admin.js"></script>
</body>
</html>
